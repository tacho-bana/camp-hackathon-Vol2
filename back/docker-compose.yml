services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyberdefense
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d cyberdefense"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
